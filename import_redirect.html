<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importa Allenamento - Workout Timer</title>

    <!-- META TAGS PER L'ANTEPRIMA (Open Graph) - Questo mostra l'icona LIUK nella condivisione -->
    <meta property="og:title" content="Allenamento da Workout Timer" />
    <meta property="og:description" content="Clicca per importare questo allenamento personalizzato nella tua app." />
    <meta property="og:image" content="https://raw.githubusercontent.com/luckliukdev/WorkOut-Sharing/main/icon.png" />
    <meta property="og:type" content="website" />

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 450px;
            padding: 30px;
            background-color: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2196F3;
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #b0b0b0;
        }
        .by-line {
            font-size: 0.9em;
            color: #757575;
            margin-top: 20px;
            font-weight: bold;
        }
        .store-button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #2196F3;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: none;
        }
        .store-button:hover {
            background-color: #1976D2;
        }
    </style>
    <script>
        function tryRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            if (data) {
                const scheme = "workouttimer";
                const host = "import";
                const intentUrl = `${scheme}://${host}?data=${data}`;
                
                // Tenta il reindirizzamento automatico all'app
                window.location.href = intentUrl;
                
                // Se dopo 2.5 secondi siamo ancora qui, mostriamo il tasto manuale
                setTimeout(() => {
                    const btn = document.getElementById('manual-btn');
                    if (btn) {
                        btn.style.display = 'inline-block';
                        btn.href = intentUrl;
                    }
                    document.getElementById('status-text').innerText = "Se l'app non si è aperta automaticamente:";
                }, 2500);
            } else {
                document.getElementById('status-text').innerText = "Errore: Link di importazione non valido.";
            }
        }
        window.onload = tryRedirect;
    </script>
</head>
<body>
    <div class="container">
        <!-- Immagine dell'icona Sviluppatore (Liuk) -->
        <img src="https://raw.githubusercontent.com/luckliukdev/WorkOut-Sharing/main/icon.png" alt="Workout Timer Icon" class="app-icon">
        
        <h1>Workout Timer</h1>
        <p id="status-text">Stai per importare un allenamento...</p>
        
        <!-- Pulsante di fallback -->
        <a id="manual-btn" href="#" class="store-button">APRI NELL'APP</a>
        
        <p class="by-line">by LIUK</p>
    </div>
</body>
</html>
